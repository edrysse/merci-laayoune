user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        listen [::]:80;
        server_name merci-laayoune.onrender.com www.merci-laayoune.onrender.com;

        # إعادة التوجيه إلى HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name merci-laayoune.onrender.com www.merci-laayoune.onrender.com;

        root /var/www/public;
        index index.php index.html index.htm;

        ssl_certificate /etc/letsencrypt/live/merci-laayoune.onrender.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/merci-laayoune.onrender.com/privkey.pem;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass 127.0.0.1:9000;  # الاتصال بـ PHP-FPM عبر المنفذ 9000
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
}
