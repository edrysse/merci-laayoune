# User and process settings
user www-data;
worker_processes auto;
pid /run/nginx.pid;

# Events block for handling connections
events {
    worker_connections 768;
}

# HTTP block for server configurations
http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log format and access/error logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression settings
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Server block for HTTP (Port 80)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name merci-laayoune.onrender.com www.merci-laayoune.onrender.com;
        root /var/www/public;
        index index.php index.html index.htm;

        # Redirect all HTTP requests to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Server block for HTTPS (Port 443)
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;

        server_name merci-laayoune.onrender.com www.merci-laayoune.onrender.com;

        # SSL Certificate Settings
        ssl_certificate /etc/letsencrypt/live/merci-laayoune.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/merci-laayoune.com/privkey.pem;

        # SSL security settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # HTTP Strict Transport Security
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Root directory and index file settings
        root /var/www/public;
        index index.php index.html index.htm;

        # Main location block for serving files
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM settings for processing PHP files
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Security headers to protect against various attacks
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options nosniff;
    }
}
