server {
    listen 80;
    server_name merci-laayoune.onrender.com www.merci-laayoune.onrender.com;

    # إعادة توجيه جميع الطلبات إلى HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name merci-laayoune.onrender.com www.merci-laayoune.onrender.com;

    # إعداد شهادات SSL
    ssl_certificate /etc/letsencrypt/live/merci-laayoune.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/merci-laayoune.com/privkey.pem;

    root /var/www/public;
    index index.php index.html index.htm;

    # إعداد الموقع
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # إعداد PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php-fpm:9000;  # استخدام اسم الخدمة بدلاً من IP
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # إعدادات الأمان
    ssl_protocols TLSv1.2 TLSv1.3;  # تأكد من استخدام البروتوكولات الحديثة
    ssl_ciphers 'HIGH:!aNULL:!MD5';   # تأمين الشيفرات
}
