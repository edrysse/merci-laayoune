user www-data;  # User under which Nginx will run
worker_processes auto;  # Automatically determine the number of worker processes
pid /run/nginx.pid;  # PID file location

events {
    worker_connections 768;  # Maximum number of simultaneous connections
}

http {
    sendfile on;  # Enable efficient file transfer
    tcp_nopush on;  # Optimize TCP packet sending
    tcp_nodelay on;  # Minimize latency for small packets
    keepalive_timeout 65;  # Timeout for keep-alive connections
    types_hash_max_size 2048;  # Maximum size of the types hash table

    include /etc/nginx/mime.types;  # Include MIME types
    default_type application/octet-stream;  # Default MIME type

    server {
        listen 80 default_server;  # Listen on port 80
        listen [::]:80 default_server;  # Listen on IPv6 as well

        server_name merci-laayoune.onrender.com www.merci-laayoune.onrender.com;  # Set your server names

        root /var/www/public;  # Document root
        index index.php index.html index.htm;  # Default index files

        # Redirect HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;  # Redirect to HTTPS
        }
    }

    server {
        listen 443 ssl;  # Listen on port 443 for HTTPS
        listen [::]:443 ssl;  # Listen on IPv6 for HTTPS

        server_name merci-laayoune.onrender.com www.merci-laayoune.onrender.com;  # Set your server names

        ssl_certificate /etc/letsencrypt/live/merci-laayoune.com/fullchain.pem;  # Path to SSL certificate
        ssl_certificate_key /etc/letsencrypt/live/merci-laayoune.com/privkey.pem;  # Path to SSL certificate key

        # Root directory for HTTPS
        root /var/www/public;  # Ensure this is the correct path
        index index.php index.html index.htm;  # Default index files for HTTPS

        location / {
            try_files $uri $uri/ /index.php?$query_string;  # Try to serve files, fallback to index.php
        }

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;  # Include PHP FastCGI configuration
            fastcgi_pass 127.0.0.1:9000;  # Connect to PHP-FPM
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;  # Set the script filename
            include fastcgi_params;  # Include additional FastCGI parameters
        }

        # Optional: Security headers
        add_header X-Frame-Options DENY;  # Prevent clickjacking
        add_header X-XSS-Protection "1; mode=block";  # Enable XSS filtering
        add_header X-Content-Type-Options nosniff;  # Prevent MIME type sniffing
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # HSTS header
    }
}
