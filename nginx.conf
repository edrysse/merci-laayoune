user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Server block for HTTP (port 80)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name merci-laayoune.onrender.com www.merci-laayoune.onrender.com;
        root /var/www/public;
        index index.php index.html index.htm;

        # Redirect all HTTP requests to HTTPS
        return 301 https://$host$request_uri;
    }

    # Server block for HTTPS (port 443)
    server {
        listen 443 ssl http2;  # Enable HTTP/2 for better performance
        listen [::]:443 ssl http2;

        server_name merci-laayoune.onrender.com www.merci-laayoune.onrender.com;

        ssl_certificate /etc/letsencrypt/live/merci-laayoune.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/merci-laayoune.com/privkey.pem;

        root /var/www/public;
        index index.php index.html index.htm;

        # Main location block for serving files
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM settings
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
